<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>YouTube to MEGA Cloud</title>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
    
    <header class="text-white bg-slate-900 body-font shadow-md">
        <div class="container mx-auto flex flex-wrap p-5 flex-col md:flex-row items-center">
            <a class="flex title-font font-medium items-center text-white mb-4 md:mb-0">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" class="w-10 h-10 text-white p-2 bg-red-600 rounded-full" viewBox="0 0 24 24">
                    <path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"></path>
                </svg>
                <span class="ml-3 text-xl font-bold tracking-wide">YT → MEGA Cloud</span>
            </a>
        </div>
    </header>

    <section class="text-gray-600 body-font bg-white border-b border-gray-200">
        <div class="container mx-auto flex px-5 py-10 items-center justify-center flex-col">
            <div class="text-center w-full max-w-2xl">
                <h1 class="title-font sm:text-4xl text-3xl mb-4 font-bold text-slate-900">Find & Transfer</h1>
                <p class="mb-8 leading-relaxed text-lg text-gray-500">Search for a video directly below, or paste a link in the forms.</p>
                
                <form id="search-form" class="flex w-full justify-center">
                    <input id="search-query" class="w-full bg-gray-100 rounded-l border border-gray-300 focus:border-red-500 focus:ring-2 focus:ring-red-200 outline-none text-gray-700 py-3 px-4 text-lg" type="text" placeholder="Search YouTube..." required>
                    <button type="submit" class="text-white bg-slate-800 py-3 px-6 rounded-r text-lg font-medium hover:bg-slate-700 transition-colors">Search</button>
                </form>

                <div id="status-box" class="hidden mt-6 p-4 rounded-md font-medium text-lg w-full border">
                    <span id="status-text">Processing...</span>
                </div>
            </div>
        </div>
    </section>

    <section id="results-section" class="text-gray-600 body-font bg-gray-100 hidden">
        <div class="container px-5 py-10 mx-auto">
            <h2 class="text-2xl font-bold text-slate-900 mb-6 text-center">Search Results</h2>
            <div id="results-grid" class="flex flex-wrap -m-4">
                </div>
        </div>
    </section>

    <section class="text-gray-600 body-font bg-gray-50">
        <div class="container px-5 py-12 mx-auto flex flex-wrap justify-center -m-4">
            
            <div class="p-4 md:w-1/2 w-full max-w-md">
                <div class="h-full bg-white p-8 rounded-lg border shadow-sm border-t-4 border-t-red-600">
                    <h3 class="text-xl font-bold text-slate-900 mb-4">Video Transfer (MP4)</h3>
                    <form id="video-form" class="flex flex-col space-y-4">
                        <input id="video-link" class="w-full bg-gray-100 rounded border border-gray-300 focus:border-red-500 focus:ring-2 focus:ring-red-200 outline-none text-gray-700 py-2 px-3" type="url" placeholder="YouTube Link..." required>
                        <button type="submit" class="w-full text-white bg-red-600 py-2 rounded text-lg font-medium hover:bg-red-700">Send Video</button>
                    </form>
                </div>
            </div>

            <div class="p-4 md:w-1/2 w-full max-w-md">
                <div class="h-full bg-white p-8 rounded-lg border shadow-sm border-t-4 border-t-indigo-600">
                    <h3 class="text-xl font-bold text-slate-900 mb-4">Audio Transfer (MP3)</h3>
                    <form id="audio-form" class="flex flex-col space-y-4">
                        <input id="audio-link" class="w-full bg-gray-100 rounded border border-gray-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none text-gray-700 py-2 px-3" type="url" placeholder="YouTube Link..." required>
                        <button type="submit" class="w-full text-white bg-indigo-600 py-2 rounded text-lg font-medium hover:bg-indigo-700">Send Audio</button>
                    </form>
                </div>
            </div>

        </div>
    </section>

    <script>
        // BACKEND URL
        const BACKEND_URL = "https://5fdd439f-44ca-44da-9853-d0bf67fb46e2-00-21i8pyaepjoky.pike.replit.dev";

        const statusBox = document.getElementById("status-box");
        const statusText = document.getElementById("status-text");
        const resultsSection = document.getElementById("results-section");
        const resultsGrid = document.getElementById("results-grid");

        // --- UI STATUS HANDLER ---
        function showStatus(message, type) {
            statusBox.className = "mt-6 p-4 rounded-md font-medium text-lg w-full max-w-2xl mx-auto border block";
            statusText.innerText = message;
            
            if (type === "loading") {
                statusBox.classList.add("bg-blue-100", "text-blue-800", "border-blue-300");
                statusBox.classList.remove("bg-green-100", "text-green-800", "bg-red-100", "text-red-800");
            } else if (type === "success") {
                statusBox.classList.add("bg-green-100", "text-green-800", "border-green-300");
                statusBox.classList.remove("bg-blue-100", "text-blue-800", "bg-red-100", "text-red-800");
            } else if (type === "error") {
                statusBox.classList.add("bg-red-100", "text-red-800", "border-red-300");
                statusBox.classList.remove("bg-blue-100", "text-blue-800", "bg-green-100", "text-green-800");
            }
        }

        // --- SEARCH ENGINE HANDLER ---
        document.getElementById("search-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const query = document.getElementById("search-query").value;
            showStatus("Searching YouTube...", "loading");
            resultsSection.classList.add("hidden"); // Hide old results

            const formData = new FormData();
            formData.append("query", query);

            try {
                const response = await fetch(`${BACKEND_URL}/search`, {
                    method: "POST",
                    body: formData
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    statusBox.classList.add("hidden"); // Hide loading bar
                    renderResults(data.results);
                } else {
                    showStatus("Error: " + data.message, "error");
                }
            } catch (error) {
                showStatus("Network Error. Is your backend awake?", "error");
            }
        });

        // --- RENDER VIDEO CARDS ---
        function renderResults(videos) {
            resultsGrid.innerHTML = ""; // Clear out previous results
            
            videos.forEach(vid => {
                // Grab the official YouTube thumbnail using the video ID
                const thumbnailUrl = `https://i.ytimg.com/vi/${vid.id}/hqdefault.jpg`;
                
                const card = `
                <div class="p-4 md:w-1/3 sm:w-1/2 w-full">
                    <div class="border-2 border-gray-200 bg-white rounded-lg overflow-hidden hover:shadow-lg transition-shadow">
                        <img class="lg:h-48 md:h-36 w-full object-cover object-center" src="${thumbnailUrl}" alt="thumbnail">
                        <div class="p-4">
                            <h2 class="text-sm title-font font-medium text-gray-400 mb-1">YOUTUBE</h2>
                            <h1 class="title-font text-lg font-bold text-gray-900 mb-3 truncate" title="${vid.title}">${vid.title}</h1>
                            <button onclick="selectVideo('${vid.url}')" class="w-full text-white bg-slate-800 hover:bg-slate-700 py-2 rounded font-medium transition-colors">
                                Select Video
                            </button>
                        </div>
                    </div>
                </div>`;
                resultsGrid.innerHTML += card;
            });
            
            resultsSection.classList.remove("hidden"); // Show the results grid
        }

        // --- AUTO-FILL FORMS WHEN A VIDEO IS CLICKED ---
        function selectVideo(url) {
            document.getElementById("video-link").value = url;
            document.getElementById("audio-link").value = url;
            
            // Scroll down to the forms smoothly
            document.getElementById("video-link").scrollIntoView({ behavior: "smooth", block: "center" });
            
            showStatus("Video selected! Click Send Video or Send Audio below.", "success");
        }

        // --- DOWNLOAD HANDLER ---
        async function processDownload(e, endpoint, linkId) {
            e.preventDefault(); 
            const link = document.getElementById(linkId).value;
            
            showStatus("Processing... This may take a few minutes for high-quality files.", "loading");

            const formData = new FormData();
            formData.append("link", link);

            try {
                const response = await fetch(`${BACKEND_URL}/${endpoint}`, {
                    method: "POST",
                    body: formData
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    showStatus(result.message, "success");
                    document.getElementById(linkId).value = ""; 
                } else {
                    showStatus("Error: " + result.message, "error");
                }
            } catch (error) {
                showStatus("Network Error. Ensure your backend is running.", "error");
            }
        }

        document.getElementById("video-form").addEventListener("submit", (e) => processDownload(e, "submit", "video-link"));
        document.getElementById("audio-form").addEventListener("submit", (e) => processDownload(e, "submit_audio", "audio-link"));
    </script>
</body>
</html>
